services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    image: oss-hub-backend:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      # migration과 runtime은 서버 .env의 postgres 서비스 DNS를 가리키는 동일한 DATABASE_URL을 사용한다.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:4000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    image: oss-hub-frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
