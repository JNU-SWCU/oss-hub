log_format query_safe '$remote_addr - $remote_user [$time_local] '
                      '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
log_format oauth_callback_safe '$remote_addr - $remote_user [$time_local] '
                               '"$request_method $uri $server_protocol" $status $body_bytes_sent';

server {
    access_log /var/log/nginx/access.log query_safe;
    listen 80;
    server_name _;

    location = /api/v1/auth/github/callback {
        access_log /var/log/nginx/access.log oauth_callback_safe;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "no-store" always;
        # proxy_pass에 URI를 붙이지 않아 callback 경로와 query를 backend에 그대로 전달한다.
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 배포 트리거 전용: GitHub Actions(deploy.yml)의 Jenkins 내장 원격 빌드 트리거 POST만
    # host Jenkins로 프록시한다. 이 경로 하나만 공개하며 Jenkins UI(그 외 경로)는 프록시하지 않는다.
    # 인증은 빌드 토큰이 담당하고, Jenkins가 tag/SHA/ancestry를 GitHub API로 재검증한다.
    location = /job/oss-hub-release-cd/buildWithParameters {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        # proxy_pass에 URI를 붙이지 않아 /api/v1 접두어를 보존한다.
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
