name: merge-policy

# ADR-005 лі‘н•© кІҢмқҙнҠё мһҗлҸҷнҷ” (#226).
# pull_request_targetВ·issue_commentлҠ” default branchмқҳ workflow м •мқҳлЎң мӢӨн–үлҗҳлҜҖлЎң
# PRмқҙ мһҗкё° headмқҳ workflowлҘј мҲҳм •н•ҙлҸ„ мқҙ нҢҗм • лЎңм§Ғмқ„ м•Ҫнҷ”н•  мҲҳ м—ҶлӢӨ.
# PR head мҪ”л“ңлҠ” checkoutВ·мӢӨн–үн•ҳм§Җ м•Ҡкі  GitHub metadataл§Ң мқҪлҠ”лӢӨ.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  issue_comment:
    types: [created, edited, deleted]

# metadata нҢҗм •кіј check л°ңн–үм—җ н•„мҡ”н•ң мөңмҶҢ к¶Ңн•ңл§Ң л¶Җм—¬н•ңлӢӨ.
permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: write

# к°ҷмқҖ PRмқҳ мқҙм „ нҸүк°ҖлҠ” м·ЁмҶҢн•ңлӢӨ вҖ” мөңмӢ  мқҙлІӨнҠё кё°мӨҖ нҢҗм •л§Ң мң нҡЁн•ҳлӢӨ.
concurrency:
  group: merge-policy-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

# мЈјмқҳ: job мқҙлҰ„мқҖ APIлЎң л°ңн–үн•ҳлҠ” check run 'merge-policy'мҷҖ лӢ¬лқјм•ј н•ңлӢӨ.
# required checkм—җлҠ” л°ҳл“ңмӢң API л°ңн–ү check run('merge-policy')мқ„ л“ұлЎқн•ңлӢӨ вҖ”
# job check('merge-policy-evaluate')лҠ” м •мұ… мӢӨнҢЁм—җлҸ„ greenмқј мҲҳ мһҲлӢӨ.
jobs:
  evaluate:
    name: merge-policy-evaluate
    # issue_commentлҠ” PR лҢ“кёҖмқј л•Ңл§Ң нҸүк°Җн•ңлӢӨ (мқјл°ҳ Issue лҢ“кёҖ м ңмҷё).
    if: github.event_name == 'pull_request_target' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # мӢ лў° кІҪкі„: нҢҗм • мҠӨнҒ¬лҰҪнҠёВ·CODEOWNERSлҠ” н•ӯмғҒ default branchм—җм„ң мқҪлҠ”лӢӨ. PR head кёҲм§Җ.
      - name: мІҙнҒ¬м•„мӣғ (default branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Node м„Өм •
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # нҢҗм •кё° мһҗмІҙ нҡҢк·ҖлҘј нҢҗм • м§Ғм „м—җ нҷ•мқён•ңлӢӨ вҖ” fixtureк°Җ к№Ём§Җл©ҙ нҢҗм •н•ҳм§Җ м•ҠлҠ”лӢӨ.
      - name: нҢҗм •кё° fixture н…ҢмҠӨнҠё
        run: node --test scripts/merge-policy-check.test.mjs

      - name: нҢҗм • л°Ҹ check run л°ңн–ү
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: node scripts/merge-policy-check.mjs
