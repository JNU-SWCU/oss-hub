name: ci

# paths н•„н„°лҘј мӮ¬мҡ©н•ҳм§Җ м•Ҡм•„ лӘЁл“  PRм—җм„ң required checkмқҙ мғқм„ұлҗҳм–ҙ көҗм°©мқ„ л°©м§Җн•ңлӢӨ.
# issuesВ·issue_commentлҠ” Issue ліёл¬ёВ·лҢ“кёҖ public-safe мҠӨмә” м „мҡ© нҠёлҰ¬кұ°лӢӨ
# (PR title/bodyл§Ң кІҖмӮ¬н•ҳлҚҳ мӮ¬к°Ғм§ҖлҢҖ вҖ” #56 мӢӨмҰқ, docs/rules/security.md).
on:
  pull_request:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

# dorny/paths-filterк°Җ PR ліҖкІҪ нҢҢмқјмқ„ мЎ°нҡҢн•  мҲҳ мһҲлҸ„лЎқ мөңмҶҢ к¶Ңн•ңмқ„ лӘ…мӢңн•ңлӢӨ.
permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ліҖкІҪлҗң м•ұл§Ң кІҖмӮ¬н•ҙ CI мӢӨн–ү мӢңк°„кіј кіјкёҲмқ„ м Ҳк°җн•ңлӢӨ.
      - name: ліҖкІҪ к°җм§Җ
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'compose.dev.yml'
              - '.github/workflows/**'
            backend:
              - 'apps/backend/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'compose.dev.yml'
              - 'scripts/run-backend-integration*.sh'
              - '.github/workflows/**'
            nginx:
              - 'deploy/nginx/**'
              - 'scripts/probe-nginx-callback-log.sh'
              - '.github/workflows/**'
            production_compose:
              - 'compose.yml'
              - '.env.example'
              - '.github/workflows/**'
            jenkins:
              - 'Jenkinsfile'
              - 'scripts/check-jenkinsfile.sh'
              - 'scripts/check-jenkinsfile.test.sh'
              - '.github/workflows/**'
            docker_context:
              - 'apps/*/Dockerfile'
              - '.dockerignore'
              - 'scripts/check-docker-context.sh'
              - 'scripts/check-docker-context.test.sh'
              - '.github/workflows/**'
            shell_scripts:
              - 'scripts/*.sh'
              - '.github/workflows/**'
            node_scripts:
              - 'scripts/*.mjs'
              - '.github/workflows/**'

      # мқҳмЎҙм„ұмқҙ м—ҶлҠ” Node лӮҙмһҘ н…ҢмҠӨнҠёлҠ” лӘЁл“  PRм—җм„ң мӢӨн–үн•ңлӢӨ.
      - name: Node м„Өм •
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: TEAM-STATE drift кІҖмӮ¬кё° лӢЁмң„н…ҢмҠӨнҠё
        run: node --test scripts/team-state-check.test.mjs

      # м•ұ ліҖкІҪмқҙ мһҲмқ„ л•Ңл§Ң pnpm storeлҘј л§Ңл“Өкі  мәҗмӢңн•ңлӢӨ. docs-only PRм—җм„ң
      # мЎҙмһ¬н•ҳм§Җ м•ҠлҠ” storeлҘј м ҖмһҘн•ҳл ӨлҠ” setup-node нӣ„мІҳлҰ¬ мӢӨнҢЁлҘј л§үлҠ”лӢӨ.
      - name: pnpm м„Өм •
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        uses: pnpm/action-setup@v4

      - name: pnpm мәҗмӢң м„Өм •
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: shell script л¬ёлІ• кІҖмӮ¬
        if: ${{ steps.changes.outputs.shell_scripts == 'true' }}
        run: bash -n scripts/*.sh

      - name: Node script л¬ёлІ• кІҖмӮ¬
        if: ${{ steps.changes.outputs.node_scripts == 'true' }}
        run: |
          for script in scripts/*.mjs; do
            node --check "$script"
          done

      - name: nginx callback лЎңк·ё кі„м•Ҫ кІҖмӮ¬
        if: ${{ steps.changes.outputs.nginx == 'true' }}
        run: bash scripts/probe-nginx-callback-log.sh

      - name: мҡҙмҳҒ Compose м„Өм • кІҖмӮ¬
        if: ${{ steps.changes.outputs.production_compose == 'true' }}
        env:
          POSTGRES_USER: synthetic_user
          POSTGRES_PASSWORD: synthetic_password_for_config_only
          POSTGRES_DB: synthetic_db
          IMAGE_TAG: synthetic-commit-sha
          DATABASE_URL: postgresql://synthetic_user:synthetic_password_for_config_only@postgres:5432/synthetic_db
          SESSION_SECRET: synthetic_session_secret_for_config_only
          FRONTEND_URL: https://synthetic.invalid
          GITHUB_OAUTH_CLIENT_ID: synthetic_client_id
          GITHUB_OAUTH_CLIENT_SECRET: synthetic_client_secret
        run: docker compose --env-file .env.example -f compose.yml config --quiet

      - name: Jenkins л°°нҸ¬ кі„м•Ҫ нҡҢк·Җ н…ҢмҠӨнҠё
        if: ${{ steps.changes.outputs.jenkins == 'true' }}
        run: |
          bash scripts/check-jenkinsfile.test.sh
          bash scripts/check-jenkinsfile.sh Jenkinsfile

      - name: Docker build context кі„м•Ҫ нҡҢк·Җ н…ҢмҠӨнҠё
        if: ${{ steps.changes.outputs.docker_context == 'true' }}
        run: |
          bash scripts/check-docker-context.test.sh
          bash scripts/check-docker-context.sh

      - name: мқҳмЎҙм„ұ м„Өм№ҳ
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: frontend lint
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend lint

      - name: frontend typecheck
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend typecheck

      - name: frontend test
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend test

      - name: frontend build
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend build

      - name: backend lint
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend lint

      - name: backend typecheck
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend typecheck

      - name: backend unit test
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend test:unit

      - name: backend integration runner contract
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: bash scripts/run-backend-integration.test.sh

      - name: backend integration test
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend test:integration

      - name: backend build
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend build

  # 1м°Ё лҸ„мһ…мқҖ advisoryлӢӨ. driftВ·unknownмқҖ non-zeroлЎң ліҙкі н•ҳлҗҳ required ciлҘј м°ЁлӢЁн•ҳм§Җ м•ҠлҠ”лӢӨ.
  team-state-drift:
    name: team-state-drift (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node м„Өм •
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: GitHub мғҒнғң drift кІҖмӮ¬
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/team-state-check.mjs

  # deny-list н‘ңл©ҙмқҖ л¬ём„ңВ·PR ліёл¬ёмқҙ н•өмӢ¬мқҙлҜҖлЎң paths-filter м—Ҷмқҙ лӘЁл“  PRм—җм„ң н•ӯмғҒ мӢӨн–үн•ңлӢӨ.
  # branch protectionм—җм„ң required checkлЎң л“ұлЎқн•ҙм•ј к°•м ңлҗңлӢӨ.
  public-safe:
    name: public-safe
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: public-safe regex нҡҢк·Җ н…ҢмҠӨнҠё
        run: bash scripts/check-public-safe.test.sh

      # org repoлҠ” gitleaks-actionмқҙ лқјмқҙм„ мҠӨ нӮӨлҘј мҡ”кө¬н•ҳлҜҖлЎң MIT лқјмқҙм„ мҠӨмқё CLIлҘј м§Ғм ‘ мӢӨн–үн•ңлӢӨ.
      # https://github.com/gitleaks/gitleaks-action#environment-variables
      - name: gitleaks мӢңнҒ¬лҰҝ мҠӨмә” (мқҙ PRмқҳ мӢ к·ң м»Өл°Ӣл§Ң)
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git --no-banner --redact --log-opts="origin/${GITHUB_BASE_REF}..HEAD" .

      # PR ліёл¬ёмқҖ ${{ }} мқёлқјмқё м№ҳнҷҳмқҙ м•„лӢҲлқј env мЈјмһ… вҖ” script injection л°©м§Җ (GitHub кіөмӢқ к¶Ңкі )
      - name: public-safe regex мҠӨмә” (deny-list)
        env:
          PR_TEXT: |
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}
        run: bash scripts/check-public-safe.sh "origin/${GITHUB_BASE_REF}"

  # Issue ліёл¬ёВ·лҢ“кёҖк№Ңм§Җ deny-list мҠӨмә” нҷ•мһҘ (PR title/bodyл§Ң кІҖмӮ¬н•ҳлҚҳ мӮ¬к°Ғм§ҖлҢҖ вҖ” #56 мӢӨмҰқ).
  # Issueм—җлҠ” required check лі‘н•© кІҢмқҙнҠёк°Җ м—ҶмңјлҜҖлЎң нғҗм§ҖВ·к°ҖмӢңнҷ” лӘ©м ҒмңјлЎң мӢӨн–үн•ңлӢӨ.
  public-safe-issue:
    name: public-safe-issue
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4

      # Issue ліёл¬ёВ·лҢ“кёҖлҸ„ ${{ }} мқёлқјмқё м№ҳнҷҳмқҙ м•„лӢҲлқј env мЈјмһ… вҖ” script injection л°©м§Җ
      - name: public-safe regex мҠӨмә” (Issue ліёл¬ёВ·лҢ“кёҖ, deny-list)
        env:
          ISSUE_TEXT: |
            ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
        run: bash scripts/check-public-safe.sh --text-only
