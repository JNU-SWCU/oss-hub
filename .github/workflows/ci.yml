name: ci

# paths 필터를 사용하지 않아 모든 PR에서 required check이 생성되어 교착을 방지한다.
# issues·issue_comment는 Issue 본문·댓글 public-safe 스캔 전용 트리거다
# (PR title/body만 검사하던 사각지대 — #56 실증, docs/rules/security.md).
on:
  pull_request:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

# dorny/paths-filter가 PR 변경 파일을 조회할 수 있도록 최소 권한을 명시한다.
permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 변경된 앱만 검사해 CI 실행 시간과 과금을 절감한다.
      - name: 변경 감지
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'compose.dev.yml'
              - '.github/workflows/**'
            backend:
              - 'apps/backend/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'compose.dev.yml'
              - 'scripts/run-backend-integration*.sh'
              - '.github/workflows/**'
            nginx:
              - 'deploy/nginx/**'
              - 'scripts/probe-nginx-callback-log.sh'
              - '.github/workflows/**'
            production_compose:
              - 'compose.yml'
              - '.env.example'
              - '.github/workflows/**'
            jenkins:
              - 'Jenkinsfile'
              - 'scripts/check-jenkinsfile.sh'
              - 'scripts/check-jenkinsfile.test.sh'
              - '.github/workflows/**'
            docker_context:
              - 'apps/*/Dockerfile'
              - '.dockerignore'
              - 'scripts/check-docker-context.sh'
              - 'scripts/check-docker-context.test.sh'
              - '.github/workflows/**'
            shell_scripts:
              - 'scripts/*.sh'
              - '.github/workflows/**'
            node_scripts:
              - 'scripts/*.mjs'
              - '.github/workflows/**'

      # 의존성이 없는 Node 내장 테스트는 모든 PR에서 실행한다.
      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: TEAM-STATE drift 검사기 단위테스트
        run: node --test scripts/team-state-check.test.mjs

      # 앱 변경이 있을 때만 pnpm store를 만들고 캐시한다. docs-only PR에서
      # 존재하지 않는 store를 저장하려는 setup-node 후처리 실패를 막는다.
      - name: pnpm 설정
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        uses: pnpm/action-setup@v4

      - name: pnpm 캐시 설정
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: shell script 문법 검사
        if: ${{ steps.changes.outputs.shell_scripts == 'true' }}
        run: bash -n scripts/*.sh

      - name: Node script 문법 검사
        if: ${{ steps.changes.outputs.node_scripts == 'true' }}
        run: |
          for script in scripts/*.mjs; do
            node --check "$script"
          done

      - name: nginx callback 로그 계약 검사
        if: ${{ steps.changes.outputs.nginx == 'true' }}
        run: bash scripts/probe-nginx-callback-log.sh

      - name: 운영 Compose 설정 검사
        if: ${{ steps.changes.outputs.production_compose == 'true' }}
        env:
          POSTGRES_USER: synthetic_user
          POSTGRES_PASSWORD: synthetic_password_for_config_only
          POSTGRES_DB: synthetic_db
          IMAGE_TAG: synthetic-commit-sha
          DATABASE_URL: postgresql://synthetic_user:synthetic_password_for_config_only@postgres:5432/synthetic_db
          SESSION_SECRET: synthetic_session_secret_for_config_only
          FRONTEND_URL: https://synthetic.invalid
          GITHUB_OAUTH_CLIENT_ID: synthetic_client_id
          GITHUB_OAUTH_CLIENT_SECRET: synthetic_client_secret
        run: docker compose --env-file .env.example -f compose.yml config --quiet

      - name: Jenkins 배포 계약 회귀 테스트
        if: ${{ steps.changes.outputs.jenkins == 'true' }}
        run: |
          bash scripts/check-jenkinsfile.test.sh
          bash scripts/check-jenkinsfile.sh Jenkinsfile

      - name: Docker build context 계약 회귀 테스트
        if: ${{ steps.changes.outputs.docker_context == 'true' }}
        run: |
          bash scripts/check-docker-context.test.sh
          bash scripts/check-docker-context.sh

      - name: 의존성 설치
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: prettier 포맷 검사
        if: ${{ steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' }}
        run: pnpm format:check

      - name: frontend lint
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend lint

      - name: frontend typecheck
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend typecheck

      - name: frontend test
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend test

      - name: frontend build
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        run: pnpm --filter frontend build

      - name: backend lint
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend lint

      - name: backend typecheck
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend typecheck

      - name: backend unit test
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend test:unit

      - name: backend integration runner contract
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: bash scripts/run-backend-integration.test.sh

      - name: backend integration test
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend test:integration

      - name: backend build
        if: ${{ steps.changes.outputs.backend == 'true' }}
        run: pnpm --filter backend build

  # 1차 도입은 advisory다. drift·unknown은 non-zero로 보고하되 required ci를 차단하지 않는다.
  team-state-drift:
    name: team-state-drift (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: GitHub 상태 drift 검사
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/team-state-check.mjs

  # 커밋 메시지 규칙(AGENTS.md §5)은 변경 경로와 무관하므로 paths-filter 없이 모든 PR에서 실행한다.
  # issue 이벤트에는 GITHUB_BASE_REF가 없어 실행하지 않는다.
  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: pnpm 설정
        uses: pnpm/action-setup@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # prisma generate 등 앱 postinstall은 이 검사에 불필요하므로 건너뛴다.
      - name: 의존성 설치 (ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Conventional Commits 검사
        run: pnpm exec commitlint --config commitlint.config.cjs --from "origin/${GITHUB_BASE_REF}" --to HEAD --verbose

  # deny-list 표면은 문서·PR 본문이 핵심이므로 paths-filter 없이 모든 PR에서 항상 실행한다.
  # branch protection에서 required check로 등록해야 강제된다.
  public-safe:
    name: public-safe
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: public-safe regex 회귀 테스트
        run: bash scripts/check-public-safe.test.sh

      # org repo는 gitleaks-action이 라이선스 키를 요구하므로 MIT 라이선스인 CLI를 직접 실행한다.
      # https://github.com/gitleaks/gitleaks-action#environment-variables
      - name: gitleaks 시크릿 스캔 (이 PR의 신규 커밋만)
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git --no-banner --redact --log-opts="origin/${GITHUB_BASE_REF}..HEAD" .

      # PR 본문은 ${{ }} 인라인 치환이 아니라 env 주입 — script injection 방지 (GitHub 공식 권고)
      - name: public-safe regex 스캔 (deny-list)
        env:
          PR_TEXT: |
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}
        run: bash scripts/check-public-safe.sh "origin/${GITHUB_BASE_REF}"

  # Issue 본문·댓글까지 deny-list 스캔 확장 (PR title/body만 검사하던 사각지대 — #56 실증).
  # Issue에는 required check 병합 게이트가 없으므로 탐지·가시화 목적으로 실행한다.
  public-safe-issue:
    name: public-safe-issue
    if: github.event_name == 'issues' || github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      # Issue 본문·댓글도 ${{ }} 인라인 치환이 아니라 env 주입 — script injection 방지
      - name: public-safe regex 스캔 (Issue 본문·댓글, deny-list)
        env:
          ISSUE_TEXT: |
            ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
        run: bash scripts/check-public-safe.sh --text-only
